<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue — Mariage Falonne & Ander</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;500&family=Josefin+Sans:wght@200;300&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #1a1510;
            overflow: hidden;
            position: relative;
        }

        /* Background photo */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: url('image 1.jpeg') center/cover no-repeat;
            filter: brightness(0.3) blur(3px);
            z-index: 0;
        }

        /* Gold particles */
        .particles {
            position: fixed; inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: radial-gradient(circle, rgba(184,155,106,0.8), transparent);
            border-radius: 50%;
            animation: particleFall linear infinite;
        }
        @keyframes particleFall {
            0% { transform: translateY(-10px) scale(0); opacity: 0; }
            20% { opacity: 1; transform: translateY(0) scale(1); }
            80% { opacity: 0.6; }
            100% { transform: translateY(100vh) scale(0.3); opacity: 0; }
        }

        /* Card */
        .welcome-card {
            position: relative; z-index: 2;
            width: 90%; max-width: 400px;
            background: linear-gradient(180deg, rgba(247,242,234,0.97), rgba(240,232,216,0.97));
            border-radius: 8px;
            overflow: hidden;
            box-shadow:
                0 25px 60px rgba(0,0,0,0.4),
                0 0 0 1px rgba(184,155,106,0.2);
            animation: cardEnter 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }
        @keyframes cardEnter {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Top section */
        .card-top {
            background: linear-gradient(135deg, #4a3828, #6b5744);
            padding: 2.5rem 2rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .card-top::after {
            content: ''; position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(184,155,106,0.5), transparent);
        }

        .card-ornament-top {
            font-family: 'Josefin Sans', sans-serif;
            font-weight: 200; font-size: 0.6rem;
            letter-spacing: 8px;
            color: rgba(212,190,142,0.4);
            margin-bottom: 1rem;
        }
        .card-monogram {
            font-family: 'Alex Brush', cursive;
            font-size: 3rem; color: #f0e8d8;
            line-height: 1;
            margin-bottom: 0.3rem;
        }
        .card-and {
            font-family: 'Alex Brush', cursive;
            font-size: 1.3rem; color: rgba(184,155,106,0.7);
        }
        .card-date {
            font-family: 'Cinzel', serif;
            font-weight: 400; font-size: 0.5rem;
            letter-spacing: 5px; color: rgba(212,190,142,0.6);
            margin-top: 0.8rem;
        }

        /* Divider */
        .card-divider {
            display: flex; align-items: center; justify-content: center;
            gap: 0.8rem; padding: 1rem 2rem;
            background: rgba(184,155,106,0.06);
        }
        .card-divider-line {
            flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, #b8a088, transparent);
        }
        .card-divider-icon {
            font-size: 0.6rem; color: #b89b6a;
        }

        /* Welcome section */
        .card-welcome {
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }
        .welcome-label {
            font-family: 'Josefin Sans', sans-serif;
            font-weight: 200; font-size: 0.55rem;
            letter-spacing: 5px; text-transform: uppercase;
            color: #b8a088;
            margin-bottom: 0.6rem;
            animation: fadeUp 0.8s ease 0.5s both;
        }
        .welcome-name {
            font-family: 'Cinzel', serif;
            font-weight: 500; font-size: 2rem; color: #4a3828;
            line-height: 1.3;
            letter-spacing: 2px;
            animation: fadeUp 0.8s ease 0.7s both;
        }
        .welcome-text {
            font-family: 'Lora', serif;
            font-style: italic; font-size: 0.85rem;
            color: #b8a088;
            margin-top: 1rem;
            line-height: 1.7;
            animation: fadeUp 0.8s ease 0.9s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Bottom badge */
        .card-badge {
            text-align: center;
            padding: 1.2rem 2rem 2rem;
        }
        .badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border: 1px solid rgba(184,155,106,0.3);
            border-radius: 30px;
            font-family: 'Josefin Sans', sans-serif;
            font-weight: 300; font-size: 0.55rem;
            letter-spacing: 4px; text-transform: uppercase;
            color: #b89b6a;
            animation: fadeUp 0.8s ease 1.1s both;
        }
        .badge-code {
            display: block;
            margin-top: 0.6rem;
            font-family: 'Josefin Sans', sans-serif;
            font-weight: 400; font-size: 0.6rem;
            letter-spacing: 3px;
            color: #b8a088;
            opacity: 0.5;
            animation: fadeUp 0.8s ease 1.3s both;
        }

        /* Error state */
        .error-card {
            position: relative; z-index: 2;
            text-align: center; padding: 3rem 2rem;
        }
        .error-card .icon { font-size: 2.5rem; margin-bottom: 1rem; }
        .error-card p {
            font-family: 'Lora', serif;
            font-style: italic; font-size: 1rem;
            color: #d4be8e;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="welcome-card" id="card" style="display:none">
        <div class="card-top">
            <div class="card-ornament-top">✦ &nbsp; ✦ &nbsp; ✦</div>
            <div class="card-monogram">Falonne</div>
            <div class="card-and">&</div>
            <div class="card-monogram">Ander</div>
            <div class="card-date">26 &nbsp; JUIN &nbsp; 2026</div>
        </div>
        <div class="card-divider">
            <div class="card-divider-line"></div>
            <div class="card-divider-icon">♥</div>
            <div class="card-divider-line"></div>
        </div>
        <div class="card-welcome">
            <div class="welcome-label">Bienvenue</div>
            <div class="welcome-name" id="guestName"></div>
            <div class="welcome-text">
                Nous sommes heureux de vous compter<br>
                parmi nos invités en ce jour si spécial
            </div>
        </div>
        <div class="card-badge">
            <div class="badge">✦ &nbsp; Invité confirmé &nbsp; ✦</div>
            <div class="badge-code" id="guestCode"></div>
        </div>
    </div>

    <div class="error-card" id="errorCard" style="display:none">
        <div class="icon">💌</div>
        <p>Invitation introuvable.<br>Vérifiez votre lien.</p>
    </div>

    <script>
    // Read URL params
    const params = new URLSearchParams(window.location.search);
    const name = params.get('n');
    const code = params.get('c');

    if (name && code) {
        document.getElementById('guestName').textContent = name;
        document.getElementById('guestCode').textContent = code;
        document.getElementById('card').style.display = '';
        document.title = 'Bienvenue ' + name + ' — Mariage F&A';
    } else {
        document.getElementById('errorCard').style.display = '';
    }

    // Gold particles
    (function() {
        const container = document.getElementById('particles');
        function create() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
            p.style.animationDuration = (4 + Math.random() * 6) + 's';
            p.style.animationDelay = '0s';
            container.appendChild(p);
            p.addEventListener('animationend', () => p.remove());
        }
        for (let i = 0; i < 15; i++) {
            setTimeout(create, i * 300);
        }
        setInterval(create, 800);
    })();
    </script>
</body>
</html>
